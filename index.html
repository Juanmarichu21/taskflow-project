<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Taskflow App</h1>
    </header>
    <main>
        <section class="tasks">
            <div class="task-card">
                <h2>Tarea 1</h2>
                <p>Categoría: Trabajo</p>
                <span class="priority">Alta</span>
            </div>
            <div class="task-card">
                <h2>Tarea 2</h2>
                <p>Categoría: Personal</p>
                <span class="priority">Media</span>
            </div>
            <div class="task-card">
                <h2>Tarea 3</h2>
                <p>Categoría: Estudio</p>
                <span class="priority">Baja</span>
            </div>
        </section>
        <aside class="sidebar">
            <h3>Filtros</h3>
            <ul>
                <li>Todas</li>
                <li>Trabajo</li>
                <li>Personal</li>
                <li>Estudio</li>
            </ul>
            <h3>Opciones</h3>
            <button>Añadir tarea</button>
        </aside>
    </main>
</body>
</html> hola a todos
